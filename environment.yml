# Conda environment for running Point-MoE outside ArcGIS (or to mirror the
# arcgispro-py3 deep-learning environment). Inside ArcGIS Pro itself, install
# "Deep Learning Essentials" instead (https://github.com/esri/deep-learning-frameworks)
# and `pip install -e .` into the arcgispro-py3 env.
name: point-moe-nz
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.23
  - scipy>=1.9
  - matplotlib>=3.6
  - pyyaml>=6.0
  - rasterio>=1.3
  - boto3>=1.28
  - botocore>=1.31
  - awscli>=1.29
  - requests>=2.31
  # PyTorch with CUDA — for NVIDIA Blackwell use a CUDA 12.8+ build.
  - pytorch>=2.4
  - pytorch-cuda=12.8
  - pip
  - pip:
      - laspy>=2.5
      - lazrs>=0.5
